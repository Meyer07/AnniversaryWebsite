<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Our Story</title>
        <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="anniversary.css">
    </head>
    <body>

        <nav>
            <a href="#home">Home</a>
            <a href="#us">Us</a>
            <a href="#her">Her</a>
            <a href="#him">Him</a>
            <a href="#note">Note</a>
        </nav>


        <div class="hero" id="home">
            <div class="petal" style="left:10%; animation-duration:8s;  animation-delay:0s;"></div>
            <div class="petal" style="left:25%; animation-duration:11s; animation-delay:2s;"></div>
            <div class="petal" style="left:55%; animation-duration:9s;  animation-delay:1s;"></div>
            <div class="petal" style="left:70%; animation-duration:13s; animation-delay:4s;"></div>
            <div class="petal" style="left:85%; animation-duration:10s; animation-delay:3s;"></div>
            <div class="petal" style="left:40%; animation-duration:7s;  animation-delay:5s;"></div>

            <p class="hero-eyebrow">Two years of us</p>
            <h1><em>Samuel Meyer</em><br>&amp; <em>Maggie Carley</em></h1>
            <p class="hero-subtitle">A love story, still being written.</p>

            <div class="timer-wrap">
                <div class="timer-unit">
                  <span class="timer-num" id="t-years">0</span>
                  <span class="timer-label">Years</span>
                </div>
                <span class="timer-sep">·</span>
                <div class="timer-unit">
                  <span class="timer-num" id="t-months">0</span>
                  <span class="timer-label">Months</span>
                </div>
                <span class="timer-sep">·</span>
                <div class="timer-unit">
                  <span class="timer-num" id="t-days">0</span>
                  <span class="timer-label">Days</span>
                </div>
                <span class="timer-sep">·</span>
                <div class="timer-unit">
                  <span class="timer-num" id="t-hours">0</span>
                  <span class="timer-label">Hours</span>
                </div>
                <span class="timer-sep">·</span>
                <div class="timer-unit">
                  <span class="timer-num" id="t-mins">0</span>
                  <span class="timer-label">Minutes</span>
                </div>
                <span class="timer-sep">·</span>
                <div class="timer-unit">
                  <span class="timer-num" id="t-secs">0</span>
                  <span class="timer-label">Seconds</span>
                </div>
              </div>
           
              <div class="scroll-hint">
                <span>Scroll</span>
                <div class="scroll-arrow"></div>
              </div>
            </div>

            <div class="section-divider"></div>

        </div>

        
    </body>
</html>
